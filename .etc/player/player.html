<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.player{
  width:940px;
  height:128px;
  border-radius:10px;
  box-shadow:0 0 20px 10px black;
  background:#111;
  display:flex;
  align-items:center;
  padding:20px;
}

audio{
  width:100%;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-family:sans-serif;
  background:rgba(0,0,0,0.7);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="player">
  <audio id="audio" controls preload="auto"></audio>
</div>

<div id="overlay" class="overlay" style="display:none">
Klikni pro spuštění přehrávání
</div>

<script>

const TIMEOUT = 2000;
const audio = document.getElementById("audio");
const overlay = document.getElementById("overlay");

const params = new URLSearchParams(location.search);
const mp3 = params.get("mp3");

if(mp3){
  audio.src = mp3;
}

let autoplayStarted = false;

function tryAutoplay(){
  const p = audio.play();

  if(p !== undefined){
    p.then(()=>{
      autoplayStarted = true;
      overlay.style.display="none";
      console.log("Autoplay OK");
    }).catch(()=>{
      console.log("Autoplay blokován");
      overlay.style.display="flex";
    });
  }
}

tryAutoplay();

setTimeout(()=>{
  if(!autoplayStarted){
    console.log("Autoplay timeout");
    overlay.style.display="flex";
  }
},TIMEOUT);

overlay.addEventListener("click",()=>{
  audio.play();
  overlay.style.display="none";
});

</script>

</body>
</html>
