<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player 2025 Stealth Hack</title>

<style>
html, body {
  margin: 0; padding: 0;
  width: 940px; height: 128px;
  overflow: hidden; background: black;
  font-family: sans-serif;
}

.player-box {
  position: relative;
  width: 940px; height: 128px;
  background: #111;
  border-radius: 10px;
  display: flex; align-items: center;
  padding: 20px; box-sizing: border-box;
}

audio { width: 100%; z-index: 1; }

/* Neviditelná vrstva přes celou stránku */
#stealth-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 9999;
  background: transparent;
  cursor: pointer;
}

#stealth-layer.removed { display: none; }
</style>
</head>

<body>

<!-- Tato vrstva "ukradne" první klik a odblokuje zvuk -->
<div id="stealth-layer"></div>

<div class="player-box">
  <audio id="audio" controls preload="auto"></audio>
</div>

<script>
const audio = document.getElementById("audio");
const layer = document.getElementById("stealth-layer");
const params = new URLSearchParams(location.search);
const mp3 = params.get("mp3");

if (mp3) audio.src = mp3;

/**
 * POKUS O TICHÝ START (PROBĚHNE HNED PŘI NAČTENÍ)
 * Prohlížeč dovolí autoplay, pokud je muted. 
 * Tím zajistíme, že audio už "běží" vteřinu předtím, než ho uživatel odblokuje.
 */
window.addEventListener('pageshow', () => {
    audio.muted = true;
    audio.play().catch(() => {
        console.log("Autoplay čeká na interakci.");
    });
});

/**
 * HACK: ODBLOKOVÁNÍ ZVUKU PŘI PRVNÍM KLIKU
 */
function activateAudio() {
    // Okamžitě vypneme mute a nastavíme hlasitost
    audio.muted = false;
    audio.volume = 0; // Začneme na nule pro fade-in efekt
    
    audio.play().then(() => {
        console.log("Audio odblokováno!");
        
        // FADE-IN EFEKT (Plynulé zesílení, aby to nebylo agresivní)
        let vol = 0;
        const interval = setInterval(() => {
            if (vol < 1) {
                vol += 0.1;
                audio.volume = Math.min(vol, 1);
            } else {
                clearInterval(interval);
            }
        }, 50);

        // Odstraníme neviditelnou vrstvu, aby bylo možné ovládat přehrávač
        layer.classList.add("removed");
    }).catch(e => console.error("Selhání aktivace:", e));
}

// Navázání na události, které prohlížeč UZNÁVÁ jako aktivaci
layer.addEventListener("click", activateAudio, { once: true });
layer.addEventListener("touchstart", activateAudio, { once: true });
layer.addEventListener("mousedown", activateAudio, { once: true });

/**
 * BONUS: AUDIO CONTEXT RESUME
 * Pro některé moderní prohlížeče, které vyžadují i odblokování Audio API.
 */
const resumeContext = () => {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) {
        const ctx = new AudioContext();
        if (ctx.state === 'suspended') ctx.resume();
    }
};
layer.addEventListener("click", resumeContext, { once: true });

</script>

</body>
</html>
