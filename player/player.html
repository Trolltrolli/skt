<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>

<style>

html,body{
margin:0;
padding:0;
width:940px;
height:128px;
overflow:hidden;
background:black;
}

.player{
width:940px;
height:128px;
background:#111;
display:flex;
align-items:center;
padding:20px;
box-sizing:border-box;
}

audio{
width:100%;
}

</style>
</head>

<body>

<div class="player">
<audio id="audio" controls preload="auto"
src="https://trolltrolli.github.io/skt/popis/Lotr/music.mp3"
autoplay muted playsinline></audio>
</div>

<script>

const audio = document.getElementById("audio");

/* pokus o okamžitý start */

audio.muted = true;

audio.play().catch(()=>{});

/* WebAudio fallback */

let ctx;
let source;

async function startAudio(){

if(!ctx){

ctx = new (window.AudioContext||window.webkitAudioContext)();

const res = await fetch(audio.src);
const buf = await res.arrayBuffer();
const decoded = await ctx.decodeAudioData(buf);

source = ctx.createBufferSource();
source.buffer = decoded;
source.loop = true;
source.connect(ctx.destination);

source.start();

}

}

/* zkusíme hned */

startAudio().catch(()=>{});

/* když browser blokuje → čekáme na interakci */

[
"pointerdown",
"mousedown",
"touchstart",
"keydown",
"click"
].forEach(e=>{

document.addEventListener(e, async ()=>{

try{

audio.muted=false;
await audio.play();

if(ctx && ctx.state==="suspended"){
await ctx.resume();
}

}catch{}

},{once:true});

});

</script>

</body>
</html>
