<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:940px;
  height:128px;
  overflow:hidden;
  background:black;
}

.player{
  width:940px;
  height:128px;
  border-radius:10px;
  box-shadow:0 0 20px 10px black;
  background:#111;
  display:flex;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

audio{
  width:100%;
}
</style>
</head>

<body>

<div class="player">
<audio id="audio" controls preload="auto"></audio>
</div>

<script>

const audio = document.getElementById("audio");
const params = new URLSearchParams(location.search);
const mp3 = params.get("mp3");

let started=false;

if(mp3){
  audio.src = mp3;
  audio.load();
}

function playAttempt(reason){

  if(started) return;

  const p = audio.play();

  if(p){
    p.then(()=>{
      started=true;
      console.log("PLAY OK:",reason);
    }).catch(()=>{
      console.log("PLAY FAIL:",reason);
    });
  }
}

/* základní pokusy */

setTimeout(()=>playAttempt("initial"),200);
setTimeout(()=>playAttempt("retry1"),800);
setTimeout(()=>playAttempt("retry2"),2000);


/* lifecycle */

audio.addEventListener("loadedmetadata",()=>playAttempt("metadata"));
audio.addEventListener("canplay",()=>playAttempt("canplay"));
audio.addEventListener("progress",()=>playAttempt("progress"));


/* focus */

window.addEventListener("focus",()=>playAttempt("focus"));


/* návrat na tab */

document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    playAttempt("tab-return");
  }
});


/* interakce */

["mousemove","scroll","click","keydown"].forEach(e=>{
  document.addEventListener(e,()=>playAttempt(e),{once:true});
});


/* MUTED HACK */

function mutedStart(){

  if(started) return;

  audio.muted=true;

  audio.play().then(()=>{

    started=true;

    console.log("muted autoplay ok");

    /* necháme to běžet potichu pár sekund */

    setTimeout(()=>{
      audio.muted=false;
    },4000);

  }).catch(()=>{});

}

setTimeout(mutedStart,1200);


/* AUDIO CONTEXT HACK */

try{

  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const source = ctx.createMediaElementSource(audio);

  source.connect(ctx.destination);

  function resumeCtx(){
    ctx.resume().then(()=>{
      playAttempt("audioContext");
    });
  }

  window.addEventListener("focus",resumeCtx);
  document.addEventListener("click",resumeCtx,{once:true});

}catch(e){}


/* watchdog */

setInterval(()=>{

  if(!started){
    playAttempt("watchdog");
  }

},3000);

</script>

</body>
</html>
