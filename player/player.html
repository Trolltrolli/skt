<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:940px;
  height:128px;
  overflow:hidden;
  background:black;
}

.player{
  width:940px;
  height:128px;
  border-radius:10px;
  box-shadow:0 0 20px 10px black;
  background:#111;
  display:flex;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

audio{
  width:100%;
}
</style>
</head>

<body>

<div class="player">
<audio id="audio" controls preload="auto"></audio>
</div>

<script>

const audio = document.getElementById("audio");
const params = new URLSearchParams(location.search);
const mp3 = params.get("mp3");

let started = false;

if(mp3){
  audio.src = mp3;
  audio.load();
}

/* ------------------------------------------------ */
/* CORE PLAY ATTEMPT */
/* ------------------------------------------------ */

function tryPlay(reason){

  if(started) return;

  const p = audio.play();

  if(p){

    p.then(()=>{
      started = true;
      console.log("PLAY SUCCESS:",reason);
      cleanup();
    })

    .catch(()=>{
      console.log("PLAY FAIL:",reason);
    });

  }

}

/* ------------------------------------------------ */
/* CLEANUP */
/* ------------------------------------------------ */

function cleanup(){

  window.removeEventListener("focus",focusPlay);
  document.removeEventListener("visibilitychange",tabReturn);

  events.forEach(e=>{
    document.removeEventListener(e,userGesture);
  });

}

/* ------------------------------------------------ */
/* NORMAL ATTEMPTS */
/* ------------------------------------------------ */

setTimeout(()=>tryPlay("initial"),200);
setTimeout(()=>tryPlay("retry1"),800);
setTimeout(()=>tryPlay("retry2"),1500);


/* ------------------------------------------------ */
/* LIFECYCLE */
/* ------------------------------------------------ */

audio.addEventListener("loadedmetadata",()=>tryPlay("metadata"));
audio.addEventListener("loadeddata",()=>tryPlay("loadeddata"));
audio.addEventListener("canplay",()=>tryPlay("canplay"));


/* ------------------------------------------------ */
/* ULTRA LOW VOLUME START */
/* ------------------------------------------------ */

function lowVolumeStart(){

  if(started) return;

  audio.volume = 0.001;

  audio.play().then(()=>{

    console.log("low volume start ok");

    setTimeout(()=>{

      audio.volume = 1;

      audio.play().catch(()=>{});

      started = true;

      cleanup();

    },2500);

  }).catch(()=>{});

}

setTimeout(lowVolumeStart,1000);


/* ------------------------------------------------ */
/* MUTED START */
/* ------------------------------------------------ */

function mutedStart(){

  if(started) return;

  audio.muted = true;

  audio.play().then(()=>{

    console.log("muted start ok");

    setTimeout(()=>{

      audio.muted = false;

      /* znovu play po unmute */

      audio.play().catch(()=>{});

      /* malý time nudge */

      audio.currentTime += 0.001;

      started = true;

      cleanup();

    },3000);

  }).catch(()=>{});

}

setTimeout(mutedStart,1800);


/* ------------------------------------------------ */
/* FOCUS */
/* ------------------------------------------------ */

function focusPlay(){
  tryPlay("focus");
}

window.addEventListener("focus",focusPlay);


/* ------------------------------------------------ */
/* TAB RETURN */
/* ------------------------------------------------ */

function tabReturn(){

  if(!document.hidden){
    tryPlay("tab return");
  }

}

document.addEventListener("visibilitychange",tabReturn);


/* ------------------------------------------------ */
/* USER GESTURE */
/* ------------------------------------------------ */

const events = ["mousemove","scroll","click","keydown"];

function userGesture(){
  tryPlay("user gesture");
}

events.forEach(e=>{
  document.addEventListener(e,userGesture,{once:true});
});


/* ------------------------------------------------ */
/* AUDIO CONTEXT */
/* ------------------------------------------------ */

try{

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaElementSource(audio);

  src.connect(ctx.destination);

  function resumeCtx(){

    ctx.resume().then(()=>{
      tryPlay("audiocontext");
    });

  }

  document.addEventListener("click",resumeCtx,{once:true});
  window.addEventListener("focus",resumeCtx);

}catch(e){}


/* ------------------------------------------------ */
/* WATCHDOG */
/* ------------------------------------------------ */

setInterval(()=>{

  if(started) return;

  if(audio.paused){
    tryPlay("watchdog");
  }

},2500);

</script>

</body>
</html>
