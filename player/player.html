<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Audio Player</title>

<style>

html,body{
  margin:0;
  padding:0;
  width:940px;
  height:128px;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

.player{
  position:relative;
  width:940px;
  height:128px;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

audio{
  width:100%;
}

/* unlock vrstva */

#unlocker{
  position:absolute;
  inset:0;
  z-index:10;
  background:rgba(0,0,0,0);
  cursor:pointer;
}

</style>
</head>

<body>

<div class="player">

<div id="unlocker"></div>

<audio
id="audio"
controls
preload="auto"
playsinline
></audio>

</div>

<script>

const audio = document.getElementById("audio");
const unlocker = document.getElementById("unlocker");

const params = new URLSearchParams(location.search);
const mp3 = params.get("mp3");

if(mp3){
  audio.src = mp3;
  audio.load();
}

/* ------------------------------------------------ */
/* SAFE PLAY */
/* ------------------------------------------------ */

function safePlay(){

  const p = audio.play();

  if(p){
    p.catch(()=>{});
  }

}

/* ------------------------------------------------ */
/* PRELOAD HACK */
/* ------------------------------------------------ */

window.addEventListener("load",()=>{

  audio.muted = true;
  audio.volume = 0.01;

  safePlay();

});

/* ------------------------------------------------ */
/* AUDIO CONTEXT */
/* ------------------------------------------------ */

let ctx;

try{

  const AC = window.AudioContext || window.webkitAudioContext;
  ctx = new AC();

  const src = ctx.createMediaElementSource(audio);
  src.connect(ctx.destination);

}catch(e){}

/* ------------------------------------------------ */
/* UNLOCK */
/* ------------------------------------------------ */

function unlock(){

  audio.muted = false;
  audio.volume = 1;

  safePlay();

  if(ctx && ctx.state === "suspended"){
    ctx.resume();
  }

  unlocker.remove();

}

/* ------------------------------------------------ */
/* EVENTS */
/* ------------------------------------------------ */

unlocker.addEventListener("pointerdown", unlock, {once:true});

window.addEventListener("keydown", unlock, {once:true});

/* ------------------------------------------------ */
/* WATCHDOG */
/* ------------------------------------------------ */

setInterval(()=>{

  if(audio.paused){
    safePlay();
  }

},4000);

</script>

</body>
</html>
