<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
html,body{
margin:0;
padding:0;
background:black;
width:940px;
height:128px;
overflow:hidden;
}

audio{
width:100%;
}
</style>
</head>

<body>

<audio id="audio" autoplay muted loop playsinline controls
src="https://badasstechie.github.io/Clips/Siren.mp3">
</audio>

<script>
const audio = document.getElementById("audio");

/* start potichu */
audio.volume = 0;

/* fade zesílení */
function fadeIn(){
    audio.muted = false;

    let v = 0;
    const step = 0.02;      // rychlost zesilování
    const interval = 120;   // ms

    const fade = setInterval(() => {
        v += step;
        if(v >= 1){
            v = 1;
            clearInterval(fade);
        }
        audio.volume = v;
    }, interval);
}

/* zkusit automaticky po startu */
setTimeout(fadeIn, 1200);

/* fallback – první pohyb myši odemkne audio */
document.addEventListener("mousemove", () => {
    if(audio.muted){
        fadeIn();
    }
},{once:true});
</script>

</body>
</html>
