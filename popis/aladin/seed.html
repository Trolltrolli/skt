<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Jumping effect</title>

<style>

html, body{
width:100%;
height:100%;
background:transparent!important;
-webkit-font-smoothing:antialiased;
display:flex;
justify-content:center;
align-items:center;
position:absolute;
height:300px;
margin:0;
}

.seed{
position:relative;
top:20px;
display:inline-block;
animation:bounce .7s ease infinite alternate;
}

@keyframes bounce{

100%{
top:-20px;
}

}

</style>

</head>


<body>

<img class="seed" src="https://trolltrolli.github.io/skt/popis/aladin/img/seed.png">

</body>

</html>
