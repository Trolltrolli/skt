<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

.marquee{
    width:100%;
    white-space:nowrap;
    overflow:hidden;
    margin-top:50px;
}

.marquee .text{
    display:inline-block;
    padding-left:100%;
    animation:cssmarquee 20s linear infinite;
    will-change:transform;

    font-family:"Showcard Gothic";
    font-size:40px;
    color:#5c1014;
    letter-spacing:.25em;
    font-weight:900;
    line-height:30px;

    -webkit-text-stroke:.2px black;

    text-shadow:
        gold .1px .1px .4px,
        red 0 0 .6px,
        red .3px .3px .6px,
        #fff .6px .9px 1.2px,
        rgba(0,0,0,.5) .2px .3px 10px,
        orange 0 0 .1px,
        gold 0 0 6px,
        gold 0 0 12px;
}

@keyframes cssmarquee{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-100%);
    }
}

img{
    vertical-align:middle;
}

</style>
</head>

<body>

<div class="marquee">
<div class="text">
<img src="https://trolltrolli.github.io/skt/popis/mix/king.gif">
&nbsp;&nbsp;BAV SE!&nbsp;&nbsp;
<img src="https://trolltrolli.github.io/skt/popis/mix/king.gif">
</div>
</div>

</body>
</html>
