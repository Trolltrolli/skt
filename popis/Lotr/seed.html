<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Jumping</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:300px;
    background:transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    -webkit-font-smoothing:antialiased;
}

h1{
    height:100px;
}

h1 span{
    display:inline-block;
    transform:translateY(20px);
    animation:bounce .7s ease infinite alternate;

    color:#5c1014;
    font-size:40px;
    letter-spacing:.25em;
    font-weight:900;
    font-family:"Showcard Gothic",sans-serif;
    text-align:center;

    -webkit-text-stroke:.2px black;

    text-shadow:
        gold .1px .1px .4px,
        red 0 0 .6px,
        red .3px .3px .6px,
        #fff .6px .9px 1.2px,
        black .2px .3px 10px,
        orange 0 0 .1px;
}

/* delay pro písmena */
h1 span:nth-child(n){
    animation-delay:calc(var(--i)*.1s);
}

@keyframes bounce{
    100%{
        transform:translateY(-20px);
        text-shadow:
            gold .1px .1px .4px,
            red 0 0 .6px,
            red .3px .3px .6px,
            #fff .6px .9px 1.2px,
            black .2px .3px 10px,
            orange 0 0 15px,
            gold .2px .3px 7px;
    }
}

</style>
</head>

<body>

<h1>
<span style="--i:1">S</span>
<span style="--i:2">E</span>
<span style="--i:3">E</span>
<span style="--i:4">D</span>
<span style="--i:5"></span>
<span style="--i:6">A</span>
<span style="--i:7"></span>
<span style="--i:8">B</span>
<span style="--i:9">O</span>
<span style="--i:10">D</span>
<span style="--i:11">Í</span>
<span style="--i:12">K</span>
<span style="--i:13">Y</span>
<span style="--i:14"></span>
<span style="--i:15">P</span>
<span style="--i:16">O</span>
<span style="--i:17">T</span>
<span style="--i:18">Ě</span>
<span style="--i:19">Š</span>
<span style="--i:20">Í</span>
</h1>

</body>
</html>
