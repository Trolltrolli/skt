<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>

html,body{
    margin:0;
    width:100%;
    height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:transparent;
    -webkit-font-smoothing:antialiased;
}

h1{
    height:100px;
}

h1 span{
    display:inline-block;

    animation:bounce .7s ease infinite alternate;
    transform:translateY(20px);

    color:#5c1014;
    font-size:40px;
    letter-spacing:.25em;
    font-weight:900;
    font-family:"Showcard Gothic",sans-serif;
    text-align:center;

    -webkit-text-stroke:.2px black;

    /* výrazně lehčí shadow */
    text-shadow:
        red 0 0 2px,
        #fff 0 0 2px,
        black 0 0 6px;
}

/* delay animace */
h1 span:nth-child(2){animation-delay:.1s;}
h1 span:nth-child(3){animation-delay:.2s;}
h1 span:nth-child(4){animation-delay:.3s;}
h1 span:nth-child(5){animation-delay:.4s;}
h1 span:nth-child(6){animation-delay:.5s;}
h1 span:nth-child(7){animation-delay:.6s;}
h1 span:nth-child(8){animation-delay:.7s;}
h1 span:nth-child(9){animation-delay:.2s;}
h1 span:nth-child(10){animation-delay:.3s;}
h1 span:nth-child(11){animation-delay:.4s;}
h1 span:nth-child(12){animation-delay:.5s;}
h1 span:nth-child(13){animation-delay:.6s;}
h1 span:nth-child(14){animation-delay:.7s;}
h1 span:nth-child(15){animation-delay:.8s;}
h1 span:nth-child(16){animation-delay:.9s;}
h1 span:nth-child(17){animation-delay:.97s;}
h1 span:nth-child(18){animation-delay:.10s;}
h1 span:nth-child(19){animation-delay:.12s;}

@keyframes bounce{
    100%{
        transform:translateY(-20px);

        text-shadow:
            red 0 0 4px,
            #fff 0 0 4px,
            black 0 0 10px;
    }
}

</style>
</head>

<body>

<h1>
<span>S</span>
<span>E</span>
<span>E</span>
<span>D</span>
<span></span>
<span>A</span>
<span></span>
<span>B</span>
<span>O</span>
<span>D</span>
<span>Í</span>
<span>K</span>
<span>Y</span>
<span></span>
<span>P</span>
<span>O</span>
<span>T</span>
<span>Ě</span>
<span>Š</span>
<span>Í</span>
</h1>

</body>
</html>
